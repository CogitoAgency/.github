<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Cogito evolution stack diagram</title>
  <desc id="desc">A static left-to-right loop showing product surfaces, Breathe, Evolve and Kernel, Engine, fitness signals, then a return arrow to the product.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#030805"/>
      <stop offset="0.58" stop-color="#071108"/>
      <stop offset="1" stop-color="#0e1d10"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102115"/>
      <stop offset="1" stop-color="#071007"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00d4aa"/>
      <stop offset="0.58" stop-color="#71d483"/>
      <stop offset="1" stop-color="#f4c430"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-25%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L10 5 L0 10 Z" fill="#f4c430"/>
    </marker>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L10 5 L0 10 Z" fill="#00d4aa"/>
    </marker>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .title { fill: #fff9e6; font-weight: 800; }
      .muted { fill: #aac0aa; }
      .label { fill: #5bad6f; font-size: 13px; font-weight: 800; letter-spacing: 0.14em; }
      .chip { fill: #d6ead6; font-size: 12px; font-weight: 800; }
      .num { fill: #030805; font-size: 15px; font-weight: 900; }
      .arrow { fill: none; stroke: url(#flow); stroke-width: 6; stroke-linecap: round; marker-end: url(#arrow); }
      .return { fill: none; stroke: #00d4aa; stroke-width: 6; stroke-linecap: round; stroke-dasharray: 18 16; marker-end: url(#arrowGreen); }
    </style>
  </defs>

  <rect width="1280" height="720" rx="34" fill="url(#bg)"/>
  <g opacity="0.24" stroke="#16331d" stroke-width="1">
    <path d="M72 132 H1208"/>
    <path d="M72 284 H1208"/>
    <path d="M72 436 H1208"/>
    <path d="M72 588 H1208"/>
    <path d="M188 64 V646"/>
    <path d="M406 64 V646"/>
    <path d="M624 64 V646"/>
    <path d="M842 64 V646"/>
    <path d="M1060 64 V646"/>
  </g>
  <circle cx="1080" cy="92" r="218" fill="#00d4aa" opacity="0.05"/>
  <circle cx="176" cy="675" r="246" fill="#5bad6f" opacity="0.05"/>

  <text x="72" y="76" class="mono label">EVOLUTION STACK</text>
  <text x="72" y="128" class="sans title" font-size="50">The codebase learns in a loop.</text>
  <text x="74" y="166" class="sans muted" font-size="22">Observe the work. Remember the trajectory. Mutate the system. Select what survives.</text>

  <path class="arrow" d="M258 342 H308"/>
  <path class="arrow" d="M488 342 H538"/>
  <path class="arrow" d="M718 342 H768"/>
  <path class="arrow" d="M948 342 H998"/>
  <path class="return" d="M1112 470 V604 H142 V478"/>

  <rect x="48" y="246" width="210" height="188" rx="22" fill="url(#node)" stroke="#30513a" filter="url(#shadow)"/>
  <circle cx="78" cy="280" r="16" fill="#00d4aa"/>
  <text x="73" y="286" class="mono num">1</text>
  <text x="104" y="284" class="sans title" font-size="24">Observe</text>
  <text x="76" y="324" class="sans muted" font-size="17">Product surfaces</text>
  <text x="76" y="354" class="sans muted" font-size="16">The apps people</text>
  <text x="76" y="378" class="sans muted" font-size="16">touch every day.</text>
  <text x="76" y="408" class="mono chip">macOS / SwiftUI</text>

  <rect x="308" y="246" width="180" height="188" rx="22" fill="url(#node)" stroke="#30513a" filter="url(#shadow)"/>
  <circle cx="338" cy="280" r="16" fill="#00d4aa"/>
  <text x="333" y="286" class="mono num">2</text>
  <text x="364" y="284" class="sans title" font-size="24">Remember</text>
  <text x="336" y="324" class="sans muted" font-size="17">Breathe</text>
  <text x="336" y="354" class="sans muted" font-size="16">Stores trajectory</text>
  <text x="336" y="378" class="sans muted" font-size="16">and evidence.</text>
  <text x="336" y="408" class="mono chip">evidence chain</text>

  <rect x="538" y="246" width="180" height="188" rx="22" fill="url(#node)" stroke="#30513a" filter="url(#shadow)"/>
  <circle cx="568" cy="280" r="16" fill="#71d483"/>
  <text x="563" y="286" class="mono num">3</text>
  <text x="594" y="284" class="sans title" font-size="24">Infer</text>
  <text x="566" y="324" class="sans muted" font-size="17">Evolve + Kernel</text>
  <text x="566" y="354" class="sans muted" font-size="16">Build a model,</text>
  <text x="566" y="378" class="sans muted" font-size="16">route agents.</text>
  <text x="566" y="408" class="mono chip">active inference</text>

  <rect x="768" y="246" width="180" height="188" rx="22" fill="url(#node)" stroke="#30513a" filter="url(#shadow)"/>
  <circle cx="798" cy="280" r="16" fill="#71d483"/>
  <text x="793" y="286" class="mono num">4</text>
  <text x="824" y="284" class="sans title" font-size="24">Execute</text>
  <text x="796" y="324" class="sans muted" font-size="17">Engine</text>
  <text x="796" y="354" class="sans muted" font-size="16">Runs tools,</text>
  <text x="796" y="378" class="sans muted" font-size="16">recipes, rules.</text>
  <text x="796" y="408" class="mono chip">MCP / YAML</text>

  <rect x="998" y="246" width="210" height="188" rx="22" fill="url(#node)" stroke="#30513a" filter="url(#shadow)"/>
  <circle cx="1028" cy="280" r="16" fill="#f4c430"/>
  <text x="1023" y="286" class="mono num">5</text>
  <text x="1054" y="284" class="sans title" font-size="24">Select</text>
  <text x="1026" y="324" class="sans muted" font-size="17">Fitness signals</text>
  <text x="1026" y="354" class="sans muted" font-size="16">Tests and traces</text>
  <text x="1026" y="378" class="sans muted" font-size="16">vote on changes.</text>
  <text x="1026" y="408" class="mono chip">selection pressure</text>

  <rect x="350" y="524" width="580" height="64" rx="28" fill="#071007" stroke="#3e6646" stroke-width="2"/>
  <text x="420" y="564" class="sans title" font-size="24">Survivors ship. Failures become playbooks.</text>
</svg>
